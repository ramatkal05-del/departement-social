<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Emerge Social Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script defer src="js/supabase.js"></script>
    <script defer src="js/auth.js"></script>
    <script defer src="js/utils.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .login-mesh {
            background-color: #ffffff;
            background-image: 
                radial-gradient(at 0% 0%, hsla(221,83%,93%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(220,100%,96%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(221,83%,93%,1) 0, transparent 50%),
                radial-gradient(at 50% 100%, hsla(221,83%,93%,1) 0, transparent 50%);
        }
    </style>
</head>
<body class="login-mesh min-h-screen flex items-center justify-center p-4">

    <div x-data="{
        email: '',
        password: '',
        loading: false,
        error: null,
        
        async login() {
            this.loading = true
            this.error = null
            
            if (!this.email || !this.password) {
                this.error = 'Veuillez remplir tous les champs'
                this.loading = false
                return
            }
            
            const result = await AuthManager.signIn(this.email, this.password)
            
            if (result.error) {
                this.error = result.error
                this.loading = false
            } else {
                window.location.href = 'dashboard.html'
            }
        }
    }" class="w-full max-w-[440px] animate-fade-in">
        
        <div class="bg-white/80 backdrop-blur-xl rounded-[2.5rem] shadow-2xl shadow-blue-900/10 border border-white p-8 lg:p-12">
            <!-- Logo & Brand -->
            <div class="text-center mb-10">
                <div class="w-20 h-20 grad-primary rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-500/30 transform transition hover:scale-105 duration-300">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Emerge Social</h1>
                <p class="text-slate-500 font-medium mt-2">Gestion de Trésorerie Connectée</p>
            </div>

            <!-- Error Message -->
            <div x-show="error" x-transition.opacity class="bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-2xl mb-6 text-sm font-medium flex items-center gap-2">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span x-text="error"></span>
            </div>

            <!-- Login Form -->
            <form @submit.prevent="login" class="space-y-5">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Adresse Email</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.206"></path></svg>
                        </div>
                        <input 
                            type="email" 
                            x-model="email"
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all duration-300 font-medium placeholder:text-slate-300"
                            placeholder="nom@exemple.com"
                            required>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Mot de passe</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <input 
                            type="password" 
                            x-model="password"
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all duration-300 font-medium placeholder:text-slate-300"
                            placeholder="••••••••"
                            required>
                    </div>
                </div>

                <button 
                    type="submit" 
                    :disabled="loading"
                    class="w-full grad-primary hover:shadow-xl hover:shadow-blue-500/40 text-white font-bold py-4 rounded-2xl transition-all duration-300 flex items-center justify-center gap-3 transform active:scale-[0.98]">
                    <span x-show="loading" class="w-5 h-5 border-3 border-white/30 border-t-white rounded-full animate-spin"></span>
                    <span x-text="loading ? 'Authentification...' : 'Se Connecter'"></span>
                    <svg x-show="!loading" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                </button>
            </form>

            <!-- Footer -->
            <div class="mt-10 text-center">
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Département Social</p>
                <div class="flex items-center justify-center gap-2 mt-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <p class="text-xs text-slate-400 font-bold tracking-tight">Système de gestion sécurisé</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initSupabase()
            if (AuthManager.isAuthenticated()) {
                window.location.href = 'dashboard.html'
            }
        })
    </script>
</body>
</html>

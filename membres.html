<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membres - Emerge Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="grad-mesh">

    <div id="app-layout"></div>

    <div id="content-to-move" x-data="membersData()" x-init="init()" class="space-y-6">
        
        <!-- Action Bar -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="relative max-w-md w-full">
                <input 
                    type="text" 
                    x-model="search"
                    placeholder="Chercher un membre..."
                    class="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none shadow-sm transition-all font-medium">
                <svg class="w-5 h-5 text-slate-400 absolute left-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            
            <button @click="showModal = true; resetForm()" class="grad-primary text-white px-6 py-3 rounded-2xl font-bold flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-blue-500/30 transition-all active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Ajouter un Membre
            </button>
        </div>

        <!-- Members Table -->
        <div class="card-premium overflow-hidden">
            <div class="table-container">
                <table class="min-w-full">
                    <thead class="hidden sm:table-header-group">
                        <tr>
                            <th class="text-left">Membre</th>
                            <th class="text-left hidden md:table-cell">Contact</th>
                            <th class="text-left hidden lg:table-cell">Départements</th>
                            <th class="text-left">Statut</th>
                            <th class="text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="member in filteredMembers" :key="member.id">
                            <tr class="hover:bg-slate-50/50 transition-colors block sm:table-row border-b sm:border-b-0 last:border-b-0 py-3 sm:py-0 px-3 sm:px-0">
                                <!-- Mobile: Stacked layout -->
                                <td class="py-2 sm:py-4 px-2 sm:px-6 block sm:table-cell">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-sm flex-shrink-0" x-text="member.name.charAt(0)"></div>
                                        <div class="min-w-0">
                                            <div class="font-bold text-slate-900 truncate" x-text="member.name"></div>
                                            <!-- Mobile only: show email -->
                                            <div class="sm:hidden text-xs text-slate-500 truncate" x-text="member.email"></div>
                                            <!-- Mobile only: show departments -->
                                            <div class="sm:hidden text-xs text-slate-500 mt-1">
                                                <span x-text="member.member_departments?.length ? member.member_departments.map(d => d.department?.name).join(', ') : 'Aucun département'"></span>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                                <td class="py-2 sm:py-4 px-2 sm:px-6 hidden md:table-cell">
                                    <div class="text-sm font-medium text-slate-600 truncate" x-text="member.email"></div>
                                    <div class="text-xs font-bold text-slate-400 uppercase tracking-wider mt-0.5" x-text="member.phone_number || 'Aucun WhatsApp'"></div>
                                </td>
                                <td class="py-2 sm:py-4 px-2 sm:px-6 hidden lg:table-cell">
                                    <div class="flex flex-wrap gap-1.5">
                                        <template x-for="dept in member.member_departments" :key="dept.id">
                                            <span class="px-2 py-0.5 bg-slate-100 text-slate-700 text-xs font-semibold rounded-md border border-slate-200" 
                                                  x-text="dept.department?.name"></span>
                                        </template>
                                        <span x-show="!member.member_departments?.length" class="text-slate-400 text-xs italic">-</span>
                                    </div>
                                </td>
                                <td class="py-2 sm:py-4 px-2 sm:px-6 block sm:table-cell">
                                    <div class="flex items-center justify-between sm:justify-start">
                                        <span :class="member.is_active ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-slate-100 text-slate-500 border-slate-200'" 
                                              class="px-2.5 py-0.5 text-xs font-bold uppercase tracking-wider rounded-full border"
                                              x-text="member.is_active ? 'Actif' : 'Inactif'"></span>
                                        <!-- Mobile: action buttons inline -->
                                        <div class="flex gap-1 sm:hidden">
                                            <button @click="editMember(member)" class="p-1.5 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                            </button>
                                            <button @click="deleteMember(member.id)" class="p-1.5 text-rose-600 hover:bg-rose-50 rounded-lg transition-colors">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                            </button>
                                        </div>
                                    </div>
                                </td>
                                <td class="py-2 sm:py-4 px-2 sm:px-6 text-right hidden sm:table-cell">
                                    <div class="flex justify-end gap-2">
                                        <button @click="editMember(member)" class="p-2 text-blue-600 hover:bg-blue-50 rounded-xl transition-colors">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                        </button>
                                        <button @click="deleteMember(member.id)" class="p-2 text-rose-600 hover:bg-rose-50 rounded-xl transition-colors">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                        <tr x-show="filteredMembers.length === 0 && !loading">
                            <td colspan="5" class="py-20 text-center text-slate-400 font-medium italic">Aucun membre trouvé</td>
                        </tr>
                        <tr x-show="loading">
                            <td colspan="5" class="py-20">
                                <div class="flex flex-col items-center gap-4">
                                    <div class="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                                    <span class="text-sm font-bold text-slate-400">Chargement...</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal -->
        <div x-show="showModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4" x-transition.opacity>
            <div class="bg-white rounded-[2.5rem] shadow-2xl p-8 lg:p-10 w-full max-w-xl max-h-[90vh] overflow-y-auto border border-white animate-fade-in" @click.away="showModal = false">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-2xl font-black text-slate-900 tracking-tight" x-text="editingId ? 'Modifier Membre' : 'Nouveau Membre'"></h3>
                    <button @click="showModal = false" class="p-2 text-slate-400 hover:text-slate-900 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <form @submit.prevent="saveMember" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Nom complet</label>
                            <input type="text" x-model="form.name" required class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-medium">
                        </div>

                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Email</label>
                            <input type="email" x-model="form.email" required class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-medium">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Numéro WhatsApp</label>
                        <input type="tel" x-model="form.phone_number" placeholder="+905551234567" class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-medium">
                        <p class="text-[10px] text-slate-400 font-bold ml-1 italic">Format: +[indicatif][numéro]</p>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Départements & Rôles</label>
                        <div class="space-y-3 max-h-60 overflow-y-auto bg-slate-50 rounded-2xl p-4 border border-slate-100">
                            <template x-for="dept in departments" :key="dept.id">
                                <div class="flex flex-col sm:flex-row sm:items-center gap-3 p-3 bg-white rounded-xl shadow-sm border border-slate-100">
                                    <label class="flex items-center gap-3 flex-1 cursor-pointer">
                                        <input type="checkbox" :value="dept.id" x-model="form.selectedDepartments" class="w-5 h-5 rounded-lg border-slate-300 text-blue-600 focus:ring-blue-500">
                                        <span class="text-sm font-bold text-slate-700" x-text="dept.name"></span>
                                    </label>
                                    <select x-show="form.selectedDepartments.includes(dept.id)" x-model="form.departmentRoles[dept.id]" class="text-xs font-bold text-slate-600 border border-slate-200 rounded-lg px-3 py-1.5 focus:border-blue-500 outline-none">
                                        <option value="MEMBRE">Membre</option>
                                        <option value="CHEF">Chef</option>
                                        <option value="CHEF_ADJOINT">Chef Adjoint</option>
                                        <option value="SECRETAIRE">Secrétaire</option>
                                    </select>
                                </div>
                            </template>
                        </div>
                    </div>

                    <label class="flex items-center gap-3 cursor-pointer group">
                        <div class="relative">
                            <input type="checkbox" x-model="form.is_active" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:bg-emerald-500 transition-colors"></div>
                            <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
                        </div>
                        <span class="text-sm font-bold text-slate-600 group-hover:text-slate-900 transition-colors">Membre actif</span>
                    </label>

                    <div class="flex flex-col sm:flex-row gap-3 pt-6">
                        <button type="button" @click="showModal = false" class="flex-1 px-6 py-4 border-2 border-slate-100 text-slate-500 font-bold rounded-2xl hover:bg-slate-50 transition-all">Annuler</button>
                        <button type="submit" class="flex-1 px-6 py-4 grad-primary text-white font-bold rounded-2xl hover:shadow-lg hover:shadow-blue-500/30 transition-all">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            UIManager.init('Gestion des Membres');
        });

        function membersData() {
            return {
                members: [],
                departments: [],
                search: '',
                showModal: false,
                editingId: null,
                loading: true,
                form: {
                    name: '',
                    email: '',
                    phone_number: '',
                    is_active: true,
                    selectedDepartments: [],
                    departmentRoles: {}
                },

                get filteredMembers() {
                    if (!this.search) return this.members
                    const searchLower = this.search.toLowerCase()
                    return this.members.filter(m => 
                        m.name.toLowerCase().includes(searchLower) ||
                        m.email.toLowerCase().includes(searchLower)
                    )
                },

                async init() {
                    AuthManager.checkAuth()
                    this.loading = true
                    await Promise.all([this.loadDepartments(), this.loadMembers()])
                    this.loading = false
                },

                async loadMembers() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    this.loading = true
                    const { data, error } = await supabase
                        .from('members')
                        .select(`
                            *,
                            member_departments(
                                id,
                                role,
                                department_id,
                                department:departments(id, name)
                            )
                        `)
                        .order('name')

                    if (error) {
                        Utils.showToast('Erreur de chargement', 'error')
                        return
                    }

                    this.members = data || []
                    this.loading = false
                },

                async loadDepartments() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const { data } = await supabase
                        .from('departments')
                        .select('*')
                        .order('name')

                    this.departments = data || []
                },

                resetForm() {
                    this.editingId = null
                    this.form = {
                        name: '',
                        email: '',
                        phone_number: '',
                        is_active: true,
                        selectedDepartments: [],
                        departmentRoles: {}
                    }
                },

                editMember(member) {
                    this.editingId = member.id
                    this.form = {
                        name: member.name,
                        email: member.email,
                        phone_number: member.phone_number || '',
                        is_active: member.is_active,
                        selectedDepartments: member.member_departments?.map(md => md.department_id) || [],
                        departmentRoles: {}
                    }
                    
                    member.member_departments?.forEach(md => {
                        this.form.departmentRoles[md.department_id] = md.role
                    })
                    
                    this.showModal = true
                },

                async saveMember() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const memberData = {
                        name: this.form.name,
                        email: this.form.email,
                        phone_number: this.form.phone_number || null,
                        is_active: this.form.is_active
                    }

                    let memberId = this.editingId

                    if (this.editingId) {
                        const { error } = await supabase
                            .from('members')
                            .update(memberData)
                            .eq('id', this.editingId)

                        if (error) {
                            Utils.showToast('Erreur de mise à jour', 'error')
                            return
                        }
                    } else {
                        const { data, error } = await supabase
                            .from('members')
                            .insert(memberData)
                            .select()

                        if (error) {
                            Utils.showToast('Erreur de création', 'error')
                            return
                        }
                        memberId = data[0].id
                    }

                    await supabase.from('member_departments').delete().eq('member_id', memberId)

                    const deptAssociations = this.form.selectedDepartments.map(deptId => ({
                        member_id: memberId,
                        department_id: deptId,
                        role: this.form.departmentRoles[deptId] || 'MEMBRE'
                    }))

                    if (deptAssociations.length > 0) {
                        await supabase.from('member_departments').insert(deptAssociations)
                    }

                    Utils.showToast(this.editingId ? 'Membre mis à jour' : 'Membre créé')
                    this.showModal = false
                    await this.loadMembers()
                },

                async deleteMember(id) {
                    if (!confirm('Êtes-vous sûr de vouloir supprimer ce membre ?')) return

                    const supabase = getSupabase()
                    if (!supabase) return

                    const { error } = await supabase.from('members').delete().eq('id', id)

                    if (error) {
                        Utils.showToast('Erreur de suppression', 'error')
                        return
                    }

                    Utils.showToast('Membre supprimé')
                    await this.loadMembers()
                }
            }
        }
    </script>
</body>
</html>

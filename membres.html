<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membres - Gestion de Trésorerie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link:hover { background-color: rgba(59, 130, 246, 0.1); }
        .sidebar-link.active { background-color: rgba(59, 130, 246, 0.15); color: #2563eb; border-right: 3px solid #2563eb; }
    </style>
</head>
<body class="bg-gray-50">

    <div x-data="membersData()" x-init="init()" class="flex h-screen">
        
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-lg flex flex-col">
            <div class="p-6 border-b">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="font-bold text-gray-900">Département Social</h1>
                        <p class="text-xs text-gray-500">Gestion Financière</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 p-4 space-y-1">
                <a href="dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                    Tableau de Bord
                </a>
                <a href="membres.html" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    Membres
                </a>
                <a href="departements.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    Départements
                </a>
                <a href="cotisations.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Périodes & Cotisations
                </a>
                <a href="contributions.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    Paiements
                </a>
                <a href="cultes.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    Cultes & Dette Salle
                </a>
                <a href="depenses.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Dépenses
                </a>
                <a href="rapports.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-700 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Rapports
                </a>
            </nav>

            <div class="p-4 border-t">
                <button @click="AuthManager.signOut()" class="flex items-center gap-3 px-4 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-lg transition w-full">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Déconnexion
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <header class="bg-white shadow-sm sticky top-0 z-10">
                <div class="px-8 py-4 flex items-center justify-between">
                    <h2 class="text-2xl font-bold text-gray-900">Gestion des Membres</h2>
                    <button @click="showModal = true; resetForm()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        Ajouter un Membre
                    </button>
                </div>
            </header>

            <div class="p-8">
                <!-- Search -->
                <div class="mb-6">
                    <div class="relative max-w-md">
                        <input 
                            type="text" 
                            x-model="search"
                            placeholder="Rechercher un membre..."
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>

                <!-- Members Table -->
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="text-left py-3 px-6 text-sm font-medium text-gray-500">Nom</th>
                                <th class="text-left py-3 px-6 text-sm font-medium text-gray-500">Email</th>
                                <th class="text-left py-3 px-6 text-sm font-medium text-gray-500">WhatsApp</th>
                                <th class="text-left py-3 px-6 text-sm font-medium text-gray-500">Départements</th>
                                <th class="text-left py-3 px-6 text-sm font-medium text-gray-500">Statut</th>
                                <th class="text-left py-3 px-6 text-sm font-medium text-gray-500">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <template x-for="member in filteredMembers" :key="member.id">
                                <tr class="hover:bg-gray-50">
                                    <td class="py-4 px-6 text-sm font-medium text-gray-900" x-text="member.name"></td>
                                    <td class="py-4 px-6 text-sm text-gray-600" x-text="member.email"></td>
                                    <td class="py-4 px-6 text-sm text-gray-600" x-text="member.phone_number || '-'"></td>
                                    <td class="py-4 px-6 text-sm text-gray-600">
                                        <div class="flex flex-wrap gap-1">
                                            <template x-for="dept in member.member_departments" :key="dept.id">
                                                <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full" 
                                                      x-text="dept.department?.name + ' (' + Utils.formatRole(dept.role) + ')'"></span>
                                            </template>
                                        </div>
                                    </td>
                                    <td class="py-4 px-6">
                                        <span :class="member.is_active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700'" 
                                              class="px-2 py-1 text-xs rounded-full font-medium"
                                              x-text="member.is_active ? 'Actif' : 'Inactif'"></span>
                                    </td>
                                    <td class="py-4 px-6">
                                        <div class="flex gap-2">
                                            <button @click="editMember(member)" class="text-blue-600 hover:text-blue-800">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                            </button>
                                            <button @click="deleteMember(member.id)" class="text-red-600 hover:text-red-800">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                            <tr x-show="filteredMembers.length === 0">
                                <td colspan="6" class="py-8 text-center text-gray-500">Aucun membre trouvé</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Modal -->
        <div x-show="showModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" x-transition>
            <div class="bg-white rounded-xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto" @click.away="showModal = false">
                <h3 class="text-xl font-bold mb-4" x-text="editingId ? 'Modifier le Membre' : 'Ajouter un Membre'"></h3>
                
                <form @submit.prevent="saveMember" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nom complet</label>
                        <input type="text" x-model="form.name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" x-model="form.email" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Numéro WhatsApp</label>
                        <input type="tel" x-model="form.phone_number" placeholder="+905551234567" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        <p class="text-xs text-gray-500 mt-1">Format: +[indicatif][numéro]</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Départements</label>
                        <div class="space-y-2 max-h-40 overflow-y-auto border border-gray-200 rounded-lg p-2">
                            <template x-for="dept in departments" :key="dept.id">
                                <div class="flex items-center gap-2 p-2 hover:bg-gray-50 rounded">
                                    <input type="checkbox" :value="dept.id" x-model="form.selectedDepartments" class="rounded border-gray-300">
                                    <span class="text-sm" x-text="dept.name"></span>
                                    <select x-show="form.selectedDepartments.includes(dept.id)" x-model="form.departmentRoles[dept.id]" class="text-sm border border-gray-300 rounded px-2 py-1 ml-auto">
                                        <option value="MEMBRE">Membre</option>
                                        <option value="CHEF">Chef</option>
                                        <option value="CHEF_ADJOINT">Chef Adjoint</option>
                                        <option value="SECRETAIRE">Secrétaire</option>
                                    </select>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <input type="checkbox" x-model="form.is_active" class="rounded border-gray-300">
                        <label class="text-sm text-gray-700">Membre actif</label>
                    </div>

                    <div class="flex gap-3 pt-4">
                        <button type="button" @click="showModal = false" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">Annuler</button>
                        <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function membersData() {
            return {
                members: [],
                departments: [],
                search: '',
                showModal: false,
                editingId: null,
                form: {
                    name: '',
                    email: '',
                    phone_number: '',
                    is_active: true,
                    selectedDepartments: [],
                    departmentRoles: {}
                },

                get filteredMembers() {
                    if (!this.search) return this.members
                    const searchLower = this.search.toLowerCase()
                    return this.members.filter(m => 
                        m.name.toLowerCase().includes(searchLower) ||
                        m.email.toLowerCase().includes(searchLower)
                    )
                },

                async init() {
                    AuthManager.checkAuth()
                    await this.loadDepartments()
                    await this.loadMembers()
                },

                async loadMembers() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const { data, error } = await supabase
                        .from('members')
                        .select(`
                            *,
                            member_departments(
                                id,
                                role,
                                department:departments(id, name)
                            )
                        `)
                        .order('name')

                    if (error) {
                        Utils.showToast('Erreur de chargement', 'error')
                        return
                    }

                    this.members = data || []
                },

                async loadDepartments() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const { data } = await supabase
                        .from('departments')
                        .select('*')
                        .order('name')

                    this.departments = data || []
                },

                resetForm() {
                    this.editingId = null
                    this.form = {
                        name: '',
                        email: '',
                        phone_number: '',
                        is_active: true,
                        selectedDepartments: [],
                        departmentRoles: {}
                    }
                },

                editMember(member) {
                    this.editingId = member.id
                    this.form = {
                        name: member.name,
                        email: member.email,
                        phone_number: member.phone_number || '',
                        is_active: member.is_active,
                        selectedDepartments: member.member_departments?.map(md => md.department_id) || [],
                        departmentRoles: {}
                    }
                    
                    member.member_departments?.forEach(md => {
                        this.form.departmentRoles[md.department_id] = md.role
                    })
                    
                    this.showModal = true
                },

                async saveMember() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const memberData = {
                        name: this.form.name,
                        email: this.form.email,
                        phone_number: this.form.phone_number || null,
                        is_active: this.form.is_active
                    }

                    let memberId = this.editingId

                    if (this.editingId) {
                        const { error } = await supabase
                            .from('members')
                            .update(memberData)
                            .eq('id', this.editingId)

                        if (error) {
                            Utils.showToast('Erreur de mise à jour', 'error')
                            return
                        }
                    } else {
                        const { data, error } = await supabase
                            .from('members')
                            .insert(memberData)
                            .select()

                        if (error) {
                            Utils.showToast('Erreur de création', 'error')
                            return
                        }
                        memberId = data[0].id
                    }

                    // Update department associations
                    await supabase.from('member_departments').delete().eq('member_id', memberId)

                    const deptAssociations = this.form.selectedDepartments.map(deptId => ({
                        member_id: memberId,
                        department_id: deptId,
                        role: this.form.departmentRoles[deptId] || 'MEMBRE'
                    }))

                    if (deptAssociations.length > 0) {
                        await supabase.from('member_departments').insert(deptAssociations)
                    }

                    Utils.showToast(this.editingId ? 'Membre mis à jour' : 'Membre créé')
                    this.showModal = false
                    await this.loadMembers()
                },

                async deleteMember(id) {
                    if (!confirm('Êtes-vous sûr de vouloir supprimer ce membre ?')) return

                    const supabase = getSupabase()
                    if (!supabase) return

                    const { error } = await supabase.from('members').delete().eq('id', id)

                    if (error) {
                        Utils.showToast('Erreur de suppression', 'error')
                        return
                    }

                    Utils.showToast('Membre supprimé')
                    await this.loadMembers()
                }
            }
        }
    </script>
</body>
</html>

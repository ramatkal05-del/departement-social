<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Périodes & Cotisations - Emerge Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="grad-mesh">

    <div id="app-layout"></div>

    <div id="content-to-move" x-data="periodsData()" x-init="init()" x-cloak class="space-y-8">
        
        <!-- Action Bar -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                Gestion des Périodes
            </h3>
            
            <button @click="showModal = true; resetForm()" class="grad-primary text-white px-6 py-3 rounded-2xl font-black flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-blue-500/30 transition-all active:scale-95 group">
                <svg class="w-5 h-5 group-hover:rotate-90 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Nouvelle Période
            </button>
        </div>

        <!-- Periods Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="p in periods" :key="p.id">
                <div class="card-premium p-6 flex flex-col group border-l-4" :class="p.is_open ? 'border-l-blue-500' : 'border-l-slate-300'">
                    <div class="flex items-center justify-between mb-4">
                        <div class="px-3 py-1 bg-blue-50 text-blue-700 text-[10px] font-black rounded-lg uppercase tracking-widest" x-text="p.name"></div>
                        <div class="flex gap-1">
                            <button @click="editPeriod(p)" class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button @click="deletePeriod(p.id)" class="p-2 text-slate-400 hover:text-rose-600 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex-1 space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Statut</span>
                            <span :class="p.is_open ? 'text-blue-600' : 'text-slate-500'" class="text-sm font-black uppercase" x-text="p.is_open ? 'Ouvert' : 'Fermé'"></span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Mois</span>
                            <span class="text-sm font-bold text-slate-700" x-text="p.month"></span>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-slate-100 italic text-[10px] text-slate-400 font-bold uppercase tracking-tighter">
                        Utilisé pour le suivi des cotisations mensuelles
                    </div>
                </div>
            </template>
            <div x-show="periods.length === 0 && !loading" class="lg:col-span-3 text-center py-20 bg-white/50 rounded-3xl border border-dashed border-slate-300">
                <p class="text-slate-400 font-medium italic text-sm">Aucune période définie</p>
            </div>
        </div>

        <!-- Modal -->
        <div x-show="showModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4" x-transition.opacity>
            <div class="bg-white rounded-[2.5rem] shadow-2xl p-6 sm:p-8 lg:p-10 w-full max-w-lg border border-white animate-fade-in" @click.away="showModal = false">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-xl sm:text-2xl font-black text-slate-900 tracking-tight">Nouvelle Période</h3>
                    <button @click="showModal = false" class="p-2 text-slate-400 hover:text-slate-900 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <form @submit.prevent="createPeriod" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Mois</label>
                        <input type="month" x-model="form.month" required class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-medium">
                    </div>

                    <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
                        <p class="text-sm font-medium text-amber-800">
                            <span class="font-bold">Info:</span> La création générera automatiquement les cotisations pour tous les membres actifs.
                        </p>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 pt-4">
                        <button type="button" @click="showModal = false" class="flex-1 px-6 py-4 border-2 border-slate-200 text-slate-500 font-bold rounded-2xl hover:bg-slate-50 transition-all">Annuler</button>
                        <button type="submit" class="flex-1 px-6 py-4 grad-primary text-white font-bold rounded-2xl hover:shadow-lg hover:shadow-blue-500/30 transition-all">Créer</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Contributions Modal -->
        <div x-show="showContributionsModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" x-transition>
            <div class="bg-white rounded-xl p-6 w-full max-w-4xl max-h-[90vh] overflow-y-auto" @click.away="showContributionsModal = false">
                <h3 class="text-xl font-bold mb-4" x-text="'Cotisations - ' + formatPeriod(selectedPeriod?.month)"></h3>
                
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">Membre</th>
                                <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">Département</th>
                                <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">Montant attendu</th>
                                <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">Montant payé</th>
                                <th class="text-left py-3 px-4 text-sm font-medium text-gray-500">Statut</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <template x-for="contrib in selectedPeriod?.expected_contributions" :key="contrib.id">
                                <tr class="hover:bg-gray-50">
                                    <td class="py-3 px-4 text-sm text-gray-900" x-text="contrib.member?.name"></td>
                                    <td class="py-3 px-4 text-sm text-gray-600" x-text="contrib.department?.name"></td>
                                    <td class="py-3 px-4 text-sm font-medium" x-text="'$' + contrib.amount_expected"></td>
                                    <td class="py-3 px-4 text-sm font-medium text-green-600" x-text="'$' + (contrib.amount_paid || 0)"></td>
                                    <td class="py-3 px-4">
                                        <span :class="contrib.status === 'PAID' ? 'bg-green-100 text-green-700' : contrib.status === 'PARTIAL' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'" 
                                              class="px-2 py-1 text-xs rounded-full font-medium"
                                              x-text="Utils.formatStatus(contrib.status)"></span>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <div class="flex justify-end pt-4">
                    <button @click="showContributionsModal = false" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">Fermer</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function periodsData() {
            return {
                periods: [],
                loading: true,
                showModal: false,
                showContributionsModal: false,
                showVariableModal: false,
                pendingVariableContributions: [],
                variableAmounts: {},
                selectedPeriod: null,
                form: {
                    month: new Date().toISOString().slice(0, 7)
                },

                async init() {
                    AuthManager.checkAuth()
                    this.loading = true
                    await this.loadPeriods()
                    this.loading = false
                },

                async loadPeriods() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    this.loading = true
                    const { data, error } = await supabase
                        .from('periods')
                        .select(`
                            *,
                            expected_contributions(
                                id,
                                amount_expected,
                                amount_paid,
                                status,
                                member:members(name),
                                department:departments(name)
                            )
                        `)
                        .order('month', { ascending: false })

                    if (error) {
                        Utils.showToast('Erreur de chargement', 'error')
                        return
                    }

                    this.periods = (data || []).map(p => {
                        const contribs = p.expected_contributions || []
                        const totalExpected = contribs.reduce((sum, c) => sum + (c.amount_expected || 0), 0)
                        const totalPaid = contribs.reduce((sum, c) => sum + (c.amount_paid || 0), 0)
                        return { ...p, totalExpected, totalPaid }
                    })
                    this.loading = false
                },

                formatPeriod(monthStr) {
                    if (!monthStr || typeof monthStr !== 'string') return '-'
                    const [year, month] = monthStr.split('-')
                    if (!year || !month) return '-'
                    const date = new Date(parseInt(year), parseInt(month) - 1)
                    return date.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' })
                },

                async createPeriod() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const [year, month] = this.form.month.split('-')
                    const startDate = new Date(parseInt(year), parseInt(month) - 1, 1)
                    const endDate = new Date(parseInt(year), parseInt(month), 0)

                    // Check if period already exists
                    const { data: existing } = await supabase
                        .from('periods')
                        .select('id')
                        .eq('month', this.form.month)
                        .single()

                    if (existing) {
                        Utils.showToast('Cette période existe déjà', 'error')
                        return
                    }

                    // Create period
                    const { data: period, error: periodError } = await supabase
                        .from('periods')
                        .insert({ 
                            month: this.form.month, 
                            start_date: startDate.toISOString().split('T')[0],
                            end_date: endDate.toISOString().split('T')[0],
                            status: 'OPEN' 
                        })
                        .select()

                    if (periodError) {
                        Utils.showToast('Erreur de création', 'error')
                        return
                    }

                    // Get active members with their departments
                    const { data: members } = await supabase
                        .from('members')
                        .select(`
                            id,
                            member_departments(
                                department:departments(id, name, contribution_type)
                            )
                        `)
                        .eq('is_active', true)

                    // Generate expected contributions
                    const contributions = []
                    const variableContributions = []
                    
                    members?.forEach(member => {
                        member.member_departments?.forEach(md => {
                            const dept = md.department
                            if (dept) {
                                if (dept.contribution_type === 'FIXED_20_USD') {
                                    contributions.push({
                                        member_id: member.id,
                                        department_id: dept.id,
                                        period_id: period[0].id,
                                        amount_expected: 20,
                                        currency: 'USD',
                                        amount_paid: 0,
                                        status: 'PENDING'
                                    })
                                } else if (dept.contribution_type === 'VARIABLE_PER_MEMBER') {
                                    // For variable departments, add to list for manual entry
                                    variableContributions.push({
                                        member_id: member.id,
                                        member_name: member.name,
                                        department_id: dept.id,
                                        department_name: dept.name,
                                        period_id: period[0].id
                                    })
                                }
                            }
                        })
                    })

                    if (contributions.length > 0) {
                        await supabase.from('expected_contributions').insert(contributions)
                    }

                    let message = 'Période créée avec ' + contributions.length + ' cotisations'
                    if (variableContributions.length > 0) {
                        message += '. ' + variableContributions.length + ' cotisations variables à configurer (Bergerie, Partenaires)'
                        this.pendingVariableContributions = variableContributions
                        this.showVariableModal = true
                    }
                    
                    Utils.showToast(message)
                    this.showModal = false
                    await this.loadPeriods()
                },

                viewContributions(period) {
                    this.selectedPeriod = period
                    this.showContributionsModal = true
                },

                async closePeriod(periodId) {
                    if (!confirm('Êtes-vous sûr de vouloir clôturer cette période ?')) return

                    const supabase = getSupabase()
                    if (!supabase) return

                    const { error } = await supabase
                        .from('periods')
                        .update({ status: 'CLOSED' })
                        .eq('id', periodId)

                    if (error) {
                        Utils.showToast('Erreur de clôture', 'error')
                        return
                    }

                    Utils.showToast('Période clôturée')
                    await this.loadPeriods()
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dépenses - Emerge Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="grad-mesh">

    <div id="app-layout"></div>

    <div id="content-to-move" x-data="depensesData()" x-init="init()" x-cloak class="space-y-8">
        
        <!-- Summary Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card-premium p-6 flex items-center gap-6">
                <div class="w-16 h-16 bg-rose-50 rounded-[2rem] flex items-center justify-center text-rose-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Total Dépenses</h4>
                    <span class="text-3xl font-black text-rose-600" x-text="Utils.formatCurrency(totalDepenses, 'USD')"></span>
                </div>
            </div>
            
            <div class="card-premium p-6 flex items-center gap-6">
                <div class="w-16 h-16 bg-blue-50 rounded-[2rem] flex items-center justify-center text-blue-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                </div>
                <div>
                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Nombre d'opérations</h4>
                    <span class="text-3xl font-black text-slate-900" x-text="depenses.length"></span>
                </div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest">Historique des Sorties</h3>
            <button @click="showModal = true; resetForm()" class="grad-primary text-white px-6 py-3 rounded-2xl font-black flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-blue-500/30 transition-all active:scale-95 group">
                <svg class="w-5 h-5 group-hover:rotate-90 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Nouvelle Dépense
            </button>
        </div>

        <!-- Depenses Table -->
        <div class="card-premium overflow-hidden">
            <div class="table-container">
                <table class="w-full">
                    <thead class="hidden sm:table-header-group">
                        <tr>
                            <th class="text-left py-3 sm:py-4 px-3 sm:px-6 text-xs font-black text-slate-400 uppercase tracking-widest">Date</th>
                            <th class="text-left py-3 sm:py-4 px-3 sm:px-6 text-xs font-black text-slate-400 uppercase tracking-widest">Description</th>
                            <th class="text-left py-3 sm:py-4 px-3 sm:px-6 text-xs font-black text-slate-400 uppercase tracking-widest">Montant</th>
                            <th class="text-right py-3 sm:py-4 px-3 sm:px-6 text-xs font-black text-slate-400 uppercase tracking-widest">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="item in depenses" :key="item.id">
                            <tr class="hover:bg-slate-50/50 transition-colors block sm:table-row border-b sm:border-b-0 last:border-b-0 py-3 sm:py-0 px-3 sm:px-0">
                                <!-- Mobile stacked view -->
                                <td class="py-2 sm:py-4 px-2 sm:px-6 block sm:table-cell">
                                    <div class="flex items-center justify-between sm:block">
                                        <div class="min-w-0 flex-1">
                                            <div class="font-bold text-slate-900 text-sm sm:text-base truncate" x-text="item.description"></div>
                                            <div class="text-xs text-slate-500 mt-0.5" x-text="Utils.formatDate(item.date)"></div>
                                        </div>
                                        <div class="font-black text-rose-600 text-sm sm:text-base sm:hidden ml-2" x-text="Utils.formatCurrency(item.amount_usd, 'USD')"></div>
                                    </div>
                                </td>
                                <td class="hidden sm:table-cell py-4 px-6 text-slate-500 font-medium" x-text="Utils.formatDate(item.date)"></td>
                                <td class="hidden sm:table-cell py-4 px-6">
                                    <div class="font-bold text-slate-900" x-text="item.description"></div>
                                </td>
                                <td class="hidden sm:table-cell py-4 px-6 font-black text-rose-600" x-text="Utils.formatCurrency(item.amount_usd, 'USD')"></td>
                                <td class="py-2 sm:py-4 px-2 sm:px-6 text-right block sm:table-cell">
                                    <!-- Desktop actions -->
                                    <div class="hidden sm:flex justify-end gap-2">
                                        <button @click="editDepense(item)" class="p-2 text-blue-600 hover:bg-blue-50 rounded-xl transition-colors">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                        </button>
                                        <button @click="deleteDepense(item.id)" class="p-2 text-rose-600 hover:bg-rose-50 rounded-xl transition-colors">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                        </button>
                                    </div>
                                    <!-- Mobile actions -->
                                    <div class="flex justify-end gap-1 sm:hidden">
                                        <button @click="editDepense(item)" class="p-1.5 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                        </button>
                                        <button @click="deleteDepense(item.id)" class="p-1.5 text-rose-600 hover:bg-rose-50 rounded-lg transition-colors">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                        <tr x-show="depenses.length === 0">
                            <td colspan="4" class="py-20 text-center text-slate-400 font-medium italic">Aucune dépense enregistrée</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal -->
        <div x-show="showModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4" x-transition.opacity>
            <div class="bg-white rounded-[2.5rem] shadow-2xl p-6 sm:p-8 lg:p-10 w-full max-w-lg border border-white animate-fade-in" @click.away="showModal = false">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-xl sm:text-2xl font-black text-slate-900 tracking-tight" x-text="editingId ? 'Modifier Dépense' : 'Nouvelle Dépense'"></h3>
                    <button @click="showModal = false" class="p-2 text-slate-400 hover:text-slate-900 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <form @submit.prevent="saveExpense" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Description</label>
                        <input type="text" x-model="form.description" required placeholder="Ex: Achat de fournitures" class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-rose-500 outline-none transition-all font-medium">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Catégorie</label>
                        <select x-model="form.category" required class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-rose-500 outline-none transition-all font-medium text-slate-700">
                            <option value="">Sélectionner...</option>
                            <option value="FOURNITURES">Fournitures</option>
                            <option value="EQUIPEMENT">Équipement</option>
                            <option value="LOCATION">Location</option>
                            <option value="TRANSPORT">Transport</option>
                            <option value="REPAS">Repas</option>
                            <option value="MARKETING">Marketing</option>
                            <option value="SALAIRE">Salaire</option>
                            <option value="AUTRE">Autre</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Montant</label>
                            <input type="number" step="0.01" x-model="form.amount" required placeholder="0.00" class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-rose-500 outline-none transition-all font-medium">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Devise</label>
                            <select x-model="form.currency" class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-rose-500 outline-none transition-all font-medium text-slate-700">
                                <option value="USD">USD ($)</option>
                                <option value="EUR">EUR (€)</option>
                                <option value="GBP">GBP (£)</option>
                                <option value="TRY">TRY (₺)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Date</label>
                        <input type="date" x-model="form.date" required class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-rose-500 outline-none transition-all font-medium">
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 pt-4">
                        <button type="button" @click="showModal = false" class="flex-1 px-6 py-4 border-2 border-slate-200 text-slate-500 font-bold rounded-2xl hover:bg-slate-50 transition-all">Annuler</button>
                        <button type="submit" class="flex-1 px-6 py-4 bg-rose-600 text-white font-bold rounded-2xl hover:bg-rose-700 transition-all">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function expensesData() {
            return {
                expenses: [],
                showModal: false,
                form: {
                    description: '',
                    category: '',
                    amount: '',
                    currency: 'USD',
                    date: new Date().toISOString().split('T')[0]
                },

                get monthlyTotal() {
                    const now = new Date()
                    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1)
                    return this.expenses
                        .filter(e => new Date(e.date) >= startOfMonth)
                        .reduce((sum, e) => sum + (e.amount_usd || 0), 0)
                },

                get topCategory() {
                    const categories = {}
                    this.expenses.forEach(e => {
                        categories[e.category] = (categories[e.category] || 0) + (e.amount_usd || 0)
                    })
                    const sorted = Object.entries(categories).sort((a, b) => b[1] - a[1])
                    return sorted.length > 0 ? this.formatCategory(sorted[0][0]) : null
                },

                async init() {
                    AuthManager.checkAuth()
                    await this.loadExpenses()
                },

                async loadExpenses() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const { data, error } = await supabase
                        .from('expenses')
                        .select('*')
                        .order('date', { ascending: false })

                    if (error) {
                        Utils.showToast('Erreur de chargement', 'error')
                        return
                    }

                    this.expenses = data || []
                },

                resetForm() {
                    this.form = {
                        description: '',
                        category: '',
                        amount: '',
                        currency: 'USD',
                        date: new Date().toISOString().split('T')[0]
                    }
                },

                formatCategory(category) {
                    const categories = {
                        'SALLE': 'Salle',
                        'AIDE_SOCIALE': 'Aide sociale',
                        'FRAIS_BANCAIRE': 'Frais bancaires',
                        'TRANSPORT': 'Transport',
                        'MATERIEL': 'Matériel',
                        'AUTRE': 'Autre'
                    }
                    return categories[category] || category
                },

                getCategoryClass(category) {
                    const classes = {
                        'SALLE': 'bg-red-100 text-red-700',
                        'AIDE_SOCIALE': 'bg-green-100 text-green-700',
                        'FRAIS_BANCAIRE': 'bg-blue-100 text-blue-700',
                        'TRANSPORT': 'bg-indigo-100 text-indigo-700',
                        'MATERIEL': 'bg-yellow-100 text-yellow-700',
                        'AUTRE': 'bg-gray-100 text-gray-700'
                    }
                    return classes[category] || 'bg-gray-100 text-gray-700'
                },

                async saveExpense() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const amountUsd = Utils.convertToUSD(parseFloat(this.form.amount), this.form.currency)

                    const { error } = await supabase.from('expenses').insert({
                        description: this.form.description,
                        category: this.form.category,
                        amount: parseFloat(this.form.amount),
                        currency: this.form.currency,
                        amount_usd: amountUsd,
                        date: this.form.date
                    })

                    if (error) {
                        Utils.showToast('Erreur de création', 'error')
                        return
                    }

                    Utils.showToast('Dépense enregistrée')
                    this.showModal = false
                    await this.loadExpenses()
                },

                async deleteExpense(id) {
                    if (!confirm('Êtes-vous sûr de vouloir supprimer cette dépense ?')) return

                    const supabase = getSupabase()
                    if (!supabase) return

                    const { error } = await supabase.from('expenses').delete().eq('id', id)

                    if (error) {
                        Utils.showToast('Erreur de suppression', 'error')
                        return
                    }

                    Utils.showToast('Dépense supprimée')
                    await this.loadExpenses()
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Départements - Emerge Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="grad-mesh">

    <div id="app-layout"></div>

    <div id="content-to-move" x-data="departmentsData()" x-init="init()" class="space-y-8">
        
        <!-- Action Bar -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                Liste des Départements
            </h3>
            
            <button @click="showModal = true; resetForm()" class="grad-primary text-white px-6 py-3 rounded-2xl font-black flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-blue-500/30 transition-all active:scale-95 group">
                <svg class="w-5 h-5 group-hover:rotate-90 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Nouveau Département
            </button>
        </div>

        <!-- Departments Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="dept in departments" :key="dept.id">
                <div class="card-premium p-6 flex flex-col group">
                    <div class="flex items-center justify-between mb-4">
                        <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                        </div>
                        <div class="flex gap-1">
                            <button @click="editDepartment(dept)" class="p-2 text-slate-400 hover:text-blue-600 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button @click="deleteDepartment(dept.id)" class="p-2 text-slate-400 hover:text-rose-600 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="flex-1">
                        <h4 class="text-xl font-black text-slate-900 mb-1" x-text="dept.name"></h4>
                        <p class="text-sm font-medium text-slate-500" x-text="dept.description || 'Aucune description'"></p>
                    </div>
                </div>
            </template>
            <div x-show="departments.length === 0" class="lg:col-span-3 text-center py-20 bg-white/50 rounded-3xl border border-dashed border-slate-300">
                <p class="text-slate-400 font-medium italic">Aucun département configuré</p>
            </div>
        </div>

        <!-- Modal -->
        <div x-show="showModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4" x-transition.opacity>
            <div class="bg-white rounded-[2.5rem] shadow-2xl p-8 lg:p-10 w-full max-w-lg overflow-hidden border border-white animate-fade-in" @click.away="showModal = false">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-2xl font-black text-slate-900 tracking-tight" x-text="editingId ? 'Modifier Département' : 'Nouveau Département'"></h3>
                    <button @click="showModal = false" class="p-2 text-slate-400 hover:text-slate-900 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <form @submit.prevent="saveDepartment" class="space-y-6">
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Nom du département</label>
                        <input type="text" x-model="form.name" required class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-bold">
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest ml-1">Description</label>
                        <textarea x-model="form.description" rows="3" class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-medium" placeholder="Brève description du rôle..."></textarea>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 pt-6">
                        <button type="button" @click="showModal = false" class="flex-1 px-6 py-4 border-2 border-slate-100 text-slate-500 font-bold rounded-2xl hover:bg-slate-50 transition-all">Annuler</button>
                        <button type="submit" class="flex-1 px-6 py-4 grad-primary text-white font-bold rounded-2xl hover:shadow-lg hover:shadow-blue-500/30 transition-all">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            UIManager.init('Départements');
        });

        function departmentsData() {
            return {
                departments: [],
                showModal: false,
                editingId: null,
                form: {
                    name: '',
                    description: ''
                },

                async init() {
                    AuthManager.checkAuth()
                    await this.loadDepartments()
                },

                async loadDepartments() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const { data, error } = await supabase
                        .from('departments')
                        .select('*')
                        .order('name')

                    if (error) {
                        Utils.showToast('Erreur de chargement', 'error')
                        return
                    }

                    this.departments = data || []
                },

                resetForm() {
                    this.editingId = null
                    this.form = {
                        name: '',
                        description: ''
                    }
                },

                editDepartment(dept) {
                    this.editingId = dept.id
                    this.form = {
                        name: dept.name,
                        description: dept.description || ''
                    }
                    this.showModal = true
                },

                async saveDepartment() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const deptData = {
                        name: this.form.name,
                        description: this.form.description
                    }

                    if (this.editingId) {
                        const { error } = await supabase
                            .from('departments')
                            .update(deptData)
                            .eq('id', this.editingId)

                        if (error) {
                            Utils.showToast('Erreur de mise à jour', 'error')
                            return
                        }
                    } else {
                        const { error } = await supabase
                            .from('departments')
                            .insert(deptData)

                        if (error) {
                            Utils.showToast('Erreur de création', 'error')
                            return
                        }
                    }

                    Utils.showToast(this.editingId ? 'Département mis à jour' : 'Département créé')
                    this.showModal = false
                    await this.loadDepartments()
                },

                async deleteDepartment(id) {
                    if (!confirm('Supprimer ce département ? Cela peut affecter les membres associés.')) return

                    const supabase = getSupabase()
                    if (!supabase) return

                    const { error } = await supabase.from('departments').delete().eq('id', id)

                    if (error) {
                        Utils.showToast('Erreur de suppression', 'error')
                        return
                    }

                    Utils.showToast('Département supprimé')
                    await this.loadDepartments()
                }
            }
        }
    </script>
</body>
</html>

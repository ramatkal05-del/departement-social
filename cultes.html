<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultes & Dette Salle - Emerge Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="grad-mesh">

    <div id="app-layout"></div>

    <div id="content-to-move" x-data="cultesData()" x-init="init()" x-cloak class="space-y-8">
        
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <p class="text-sm font-medium text-gray-500">Total Cultes (Mois)</p>
                        <p class="text-2xl font-bold text-gray-900 mt-1" x-text="monthlyCults.length">0</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <p class="text-sm font-medium text-gray-500">Dette de Salle</p>
                        <p class="text-2xl font-bold text-orange-600 mt-1" x-text="Utils.formatCurrency(monthlyDebt, 'USD')">$0</p>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <p class="text-sm font-medium text-gray-500">Coût par Culte</p>
                        <p class="text-2xl font-bold text-gray-900 mt-1">54 USD</p>
                    </div>
                </div>

                <!-- Period Selector -->
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Période</label>
                    <select x-model="selectedPeriod" @change="loadCults()" class="px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none">
                        <option value="">Sélectionner une période</option>
                        <template x-for="period in periods" :key="period.id">
                            <option :value="period.id" x-text="Utils.formatMonth(period.month)"></option>
                        </template>
                    </select>
                </div>

                <!-- Cults List -->
                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="text-left py-3 px-6 text-sm font-medium text-gray-500">Date</th>
                                <th class="text-left py-3 px-6 text-sm font-medium text-gray-500">Description</th>
                                <th class="text-left py-3 px-6 text-sm font-medium text-gray-500">Coût</th>
                                <th class="text-left py-3 px-6 text-sm font-medium text-gray-500">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <template x-for="cult in cults" :key="cult.id">
                                <tr class="hover:bg-gray-50">
                                    <td class="py-4 px-6 text-sm text-gray-900" x-text="Utils.formatDate(cult.date)"></td>
                                    <td class="py-4 px-6 text-sm text-gray-600" x-text="cult.description"></td>
                                    <td class="py-4 px-6 text-sm font-medium text-orange-600" x-text="Utils.formatCurrency(cult.cost, cult.currency)"></td>
                                    <td class="py-4 px-6">
                                        <button @click="deleteCult(cult.id)" class="text-red-600 hover:text-red-800">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                            <tr x-show="cults.length === 0">
                                <td colspan="4" class="py-8 text-center text-gray-500">Aucun culte enregistré pour cette période</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Modal -->
        <div x-show="showModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" x-transition>
            <div class="bg-white rounded-xl p-6 w-full max-w-md" @click.away="showModal = false">
                <h3 class="text-xl font-bold mb-4">Ajouter un Culte</h3>
                
                <form @submit.prevent="saveCult" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                        <input type="date" x-model="form.date" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <input type="text" x-model="form.description" placeholder="Culte hebdomadaire" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Coût</label>
                            <input type="number" step="0.01" x-model="form.cost" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Devise</label>
                            <select x-model="form.currency" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none">
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                                <option value="GBP">GBP</option>
                                <option value="TRY">TRY</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex gap-3 pt-4">
                        <button type="button" @click="showModal = false" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">Annuler</button>
                        <button type="submit" class="flex-1 px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 transition">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function cultesData() {
            return {
                cults: [],
                periods: [],
                selectedPeriod: '',
                monthlyCults: [],
                monthlyDebt: 0,
                showModal: false,
                form: {
                    date: new Date().toISOString().split('T')[0],
                    description: 'Culte hebdomadaire',
                    cost: 54,
                    currency: 'USD'
                },

                async init() {
                    AuthManager.checkAuth()
                    await this.loadPeriods()
                    // Select current period by default
                    const currentMonth = new Date().toISOString().slice(0, 7)
                    const currentPeriod = this.periods.find(p => p.month === currentMonth)
                    if (currentPeriod) {
                        this.selectedPeriod = currentPeriod.id
                        await this.loadCults()
                    }
                    await this.loadMonthlyStats()
                },

                async loadPeriods() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const { data } = await supabase
                        .from('periods')
                        .select('*')
                        .order('month', { ascending: false })

                    this.periods = data || []
                },

                async loadCults() {
                    if (!this.selectedPeriod) {
                        this.cults = []
                        return
                    }

                    const supabase = getSupabase()
                    if (!supabase) return

                    const { data, error } = await supabase
                        .from('cults')
                        .select('*')
                        .eq('period_id', this.selectedPeriod)
                        .order('date', { ascending: false })

                    if (error) {
                        Utils.showToast('Erreur de chargement', 'error')
                        return
                    }

                    this.cults = data || []
                },

                async loadMonthlyStats() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const startOfMonth = new Date()
                    startOfMonth.setDate(1)
                    startOfMonth.setHours(0, 0, 0, 0)

                    const { data } = await supabase
                        .from('cults')
                        .select('cost, currency')
                        .gte('date', startOfMonth.toISOString())

                    this.monthlyCults = data || []
                    this.monthlyDebt = this.monthlyCults.reduce((sum, c) => {
                        return sum + Utils.convertToUSD(c.cost || 54, c.currency || 'USD')
                    }, 0)
                },

                resetForm() {
                    this.form = {
                        date: new Date().toISOString().split('T')[0],
                        description: 'Culte hebdomadaire',
                        cost: 54,
                        currency: 'USD'
                    }
                },

                async saveCult() {
                    if (!this.selectedPeriod) {
                        Utils.showToast('Veuillez sélectionner une période', 'error')
                        return
                    }

                    const supabase = getSupabase()
                    if (!supabase) return

                    const amountUsd = Utils.convertToUSD(parseFloat(this.form.cost), this.form.currency)

                    const { error } = await supabase.from('cults').insert({
                        period_id: this.selectedPeriod,
                        date: this.form.date,
                        description: this.form.description,
                        cost: parseFloat(this.form.cost),
                        currency: this.form.currency
                    })

                    if (error) {
                        Utils.showToast('Erreur de création', 'error')
                        return
                    }

                    Utils.showToast('Culte enregistré')
                    this.showModal = false
                    await this.loadCults()
                    await this.loadMonthlyStats()
                },

                async deleteCult(id) {
                    if (!confirm('Êtes-vous sûr de vouloir supprimer ce culte ?')) return

                    const supabase = getSupabase()
                    if (!supabase) return

                    const { error } = await supabase.from('cults').delete().eq('id', id)

                    if (error) {
                        Utils.showToast('Erreur de suppression', 'error')
                        return
                    }

                    Utils.showToast('Culte supprimé')
                    await this.loadCults()
                    await this.loadMonthlyStats()
                }
            }
        }
    </script>
</body>
</html>

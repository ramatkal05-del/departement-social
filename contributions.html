<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contributions - Emerge Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="grad-mesh">

    <div id="app-layout"></div>

    <div id="content-to-move" x-data="contributionsData()" x-init="init()" x-cloak class="space-y-8">
        
        <!-- Action Bar & Stats -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 flex flex-col sm:flex-row gap-4">
                <div class="relative flex-1">
                    <input 
                        type="text" 
                        x-model="search"
                        placeholder="Chercher une contribution..."
                        class="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none shadow-sm transition-all font-medium text-sm">
                    <svg class="w-5 h-5 text-slate-400 absolute left-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <select x-model="filterMember" class="px-4 py-3 bg-white border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none shadow-sm font-bold text-slate-600 text-sm">
                    <option value="">Tous les membres</option>
                    <template x-for="member in members" :key="member.id">
                        <option :value="member.id" x-text="member.name"></option>
                    </template>
                </select>
            </div>
            
            <button @click="showModal = true; resetForm()" class="grad-primary text-white px-6 py-3 rounded-2xl font-black flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-blue-500/30 transition-all active:scale-95 group">
                <svg class="w-6 h-6 transform group-hover:rotate-90 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                Enregistrer un Paiement
            </button>
        </div>

        <!-- Payments Table -->
        <div class="card-premium overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h3 class="text-sm font-black text-slate-400 uppercase tracking-widest">Historique des Paiements</h3>
                <span class="px-3 py-1 bg-blue-100 text-blue-700 text-[10px] font-black rounded-full uppercase tracking-tighter" x-text="filteredPayments.length + ' Entrées'"></span>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Membre</th>
                            <th>Période</th>
                            <th>Montant</th>
                            <th>Type</th>
                            <th class="text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="payment in filteredPayments" :key="payment.id">
                            <tr class="hover:bg-slate-50/80 transition-colors">
                                <td class="py-4 px-6 text-slate-500 font-medium" x-text="Utils.formatDate(payment.date)"></td>
                                <td class="py-4 px-6">
                                    <div class="font-bold text-slate-900" x-text="payment.member?.name || 'Inconnu'"></div>
                                </td>
                                <td class="py-4 px-6 font-bold text-slate-600" x-text="payment.period?.name || '-'"></td>
                                <td class="py-4 px-6">
                                    <div class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-0.5">Montant</div>
                                    <div class="font-black text-emerald-600 text-lg leading-none" x-text="Utils.formatCurrency(payment.amount_usd, 'USD')"></div>
                                </td>
                                <td class="py-4 px-6">
                                    <span class="px-3 py-1 bg-slate-100 text-slate-700 text-[10px] font-black rounded-lg border border-slate-200 uppercase tracking-tight" x-text="payment.type || 'Fixe'"></span>
                                </td>
                                <td class="py-4 px-6 text-right">
                                    <div class="flex justify-end gap-2">
                                        <button @click="editPayment(payment)" class="p-2 text-blue-600 hover:bg-blue-50 rounded-xl transition-colors">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                        </button>
                                        <button @click="deletePayment(payment.id)" class="p-2 text-rose-600 hover:bg-rose-50 rounded-xl transition-colors text-right">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                        <tr x-show="filteredPayments.length === 0">
                            <td colspan="6" class="py-24 text-center">
                                <template x-if="loading">
                                    <div class="flex flex-col items-center gap-4">
                                        <div class="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
                                        <span class="text-sm font-bold text-slate-400">Chargement des données...</span>
                                    </div>
                                </template>
                                <template x-if="!loading">
                                    <div class="flex flex-col items-center gap-4 opacity-40">
                                        <svg class="w-16 h-16 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                                        <span class="font-bold text-slate-400 italic text-sm">Aucune contribution trouvée</span>
                                    </div>
                                </template>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal -->
        <div x-show="showModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4" x-transition.opacity>
            <div class="bg-white rounded-[2.5rem] shadow-2xl p-6 sm:p-8 lg:p-10 w-full max-w-xl max-h-[90vh] overflow-y-auto border border-white animate-fade-in" @click.away="showModal = false">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="text-xl sm:text-2xl font-black text-slate-900 tracking-tight" x-text="editingId ? 'Modifier Paiement' : 'Nouveau Paiement'"></h3>
                    <button @click="showModal = false" class="p-2 text-slate-400 hover:text-slate-900 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <form @submit.prevent="savePayment" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Membre</label>
                        <select x-model="form.member_id" @change="loadPendingContributions($event.target.value)" required class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-medium text-slate-700">
                            <option value="">Sélectionner un membre...</option>
                            <template x-for="member in members" :key="member.id">
                                <option :value="member.id" x-text="member.name"></option>
                            </template>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Montant Total</label>
                            <input type="number" step="0.01" x-model="form.amount_total" required class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-medium" placeholder="0.00">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Devise</label>
                            <select x-model="form.currency" class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-medium text-slate-700">
                                <option value="USD">USD ($)</option>
                                <option value="EUR">EUR (€)</option>
                                <option value="GBP">GBP (£)</option>
                                <option value="TRY">TRY (₺)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Date</label>
                        <input type="date" x-model="form.date" required class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-medium">
                    </div>

                    <div x-show="pendingContributions.length > 0" class="space-y-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Cotisations en attente</label>
                        <div class="max-h-40 overflow-y-auto bg-slate-50 rounded-2xl p-3 border border-slate-100 space-y-2">
                            <template x-for="contrib in pendingContributions" :key="contrib.id">
                                <div class="flex items-center justify-between p-3 bg-white rounded-xl shadow-sm">
                                    <label class="flex items-center gap-3 cursor-pointer">
                                        <input type="checkbox" :value="contrib.id" x-model="form.selectedContributions" class="w-5 h-5 rounded-lg border-slate-300 text-blue-600 focus:ring-blue-500">
                                        <span class="text-sm font-medium text-slate-700" x-text="contrib.period?.month + ' - ' + contrib.department?.name"></span>
                                    </label>
                                    <span class="text-sm font-bold text-slate-500" x-text="'$' + (contrib.amount_expected - (contrib.amount_paid || 0)).toFixed(2)"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Room Debt Info -->
                    <div x-show="memberRoomDebt > 0" class="bg-orange-50 border border-orange-200 rounded-2xl p-4">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                            <div>
                                <p class="text-sm font-bold text-orange-800">Dette Salle à payer (prioritaire)</p>
                                <p class="text-xs text-orange-600 mt-1">Cette somme sera déduite en premier</p>
                            </div>
                            <p class="text-xl font-black text-orange-600" x-text="'$' + memberRoomDebt.toFixed(2)"></p>
                        </div>
                    </div>

                    <!-- Auto-allocation Info -->
                    <div x-show="form.amount_total && parseFloat(form.amount_total) > 0" class="bg-blue-50 border border-blue-200 rounded-2xl p-4">
                        <h4 class="text-sm font-bold text-blue-800 mb-3">Répartition automatique:</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-blue-700">1. Dette Salle (priorité):</span>
                                <span class="font-bold" x-text="'$' + calculateRoomAllocation().toFixed(2)"></span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-blue-700">2. Cotisations:</span>
                                <span class="font-bold" x-text="'$' + calculateContributionAllocation().toFixed(2)"></span>
                            </div>
                            <div class="flex justify-between border-t border-blue-200 pt-2 mt-2">
                                <span class="text-blue-800 font-bold">Reste non alloué:</span>
                                <span class="font-black text-blue-900" x-text="'$' + calculateRemaining().toFixed(2)"></span>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Note (optionnel)</label>
                        <input type="text" x-model="form.note" placeholder="Ex: Paiement anticipé" class="w-full px-4 py-3 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-blue-500 outline-none transition-all font-medium">
                    </div>

                    <label class="flex items-center gap-3 cursor-pointer group">
                        <div class="relative">
                            <input type="checkbox" x-model="form.is_advance" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:bg-blue-500 transition-colors"></div>
                            <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
                        </div>
                        <span class="text-sm font-bold text-slate-600 group-hover:text-slate-900 transition-colors">Paiement anticipé</span>
                    </label>

                    <div class="flex flex-col sm:flex-row gap-3 pt-4">
                        <button type="button" @click="showModal = false" class="flex-1 px-6 py-4 border-2 border-slate-200 text-slate-500 font-bold rounded-2xl hover:bg-slate-50 transition-all">Annuler</button>
                        <button type="submit" class="flex-1 px-6 py-4 grad-primary text-white font-bold rounded-2xl hover:shadow-lg hover:shadow-blue-500/30 transition-all">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function contributionsData() {
            return {
                payments: [],
                members: [],
                pendingContributions: [],
                memberRoomDebt: 0,
                showModal: false,
                form: {
                    member_id: '',
                    amount_total: '',
                    currency: 'USD',
                    date: new Date().toISOString().split('T')[0],
                    note: '',
                    is_advance: false,
                    selectedContributions: [],
                    room_allocation: 0
                },

                async init() {
                    AuthManager.checkAuth()
                    await this.loadMembers()
                    await this.loadPayments()
                },

                async loadMembers() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const { data } = await supabase
                        .from('members')
                        .select('*')
                        .eq('is_active', true)
                        .order('name')

                    this.members = data || []
                },

                async loadPayments() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const { data, error } = await supabase
                        .from('payments')
                        .select(`
                            *,
                            member:members(name),
                            payment_allocations(
                                id,
                                amount,
                                expected_contribution:expected_contributions(
                                    period:periods(month)
                                )
                            )
                        `)
                        .order('date', { ascending: false })

                    if (error) {
                        Utils.showToast('Erreur de chargement', 'error')
                        return
                    }

                    this.payments = data || []
                },

                async loadPendingContributions(memberId) {
                    if (!memberId) {
                        this.pendingContributions = []
                        this.memberRoomDebt = 0
                        return
                    }

                    const supabase = getSupabase()
                    if (!supabase) return

                    // Get pending contributions
                    const { data: contributions } = await supabase
                        .from('expected_contributions')
                        .select(`
                            *,
                            period:periods(month, id),
                            department:departments(name)
                        `)
                        .eq('member_id', memberId)
                        .in('status', ['PENDING', 'PARTIAL'])

                    this.pendingContributions = contributions || []

                    // Calculate member's share of room debt for each period
                    await this.calculateMemberRoomDebt(memberId, contributions)
                },

                async calculateMemberRoomDebt(memberId, contributions) {
                    const supabase = getSupabase()
                    if (!supabase || !contributions?.length) {
                        this.memberRoomDebt = 0
                        return
                    }

                    let totalRoomDebt = 0

                    for (const contrib of contributions) {
                        const periodId = contrib.period?.id
                        if (!periodId) continue

                        // Get total room debt for this period
                        const { data: cults } = await supabase
                            .from('cults')
                            .select('cost')
                            .eq('period_id', periodId)

                        const periodRoomDebt = cults?.reduce((sum, c) => sum + (c.cost || 54), 0) || 0

                        // Get total number of contributors for this period
                        const { data: totalContributors } = await supabase
                            .from('expected_contributions')
                            .select('id', { count: 'exact' })
                            .eq('period_id', periodId)

                        const contributorCount = totalContributors?.length || 1

                        // Member's share = total room debt / number of contributors
                        const memberShare = periodRoomDebt / contributorCount
                        totalRoomDebt += memberShare
                    }

                    this.memberRoomDebt = totalRoomDebt
                },

                calculateRoomAllocation() {
                    const paymentAmount = parseFloat(this.form.amount_total) || 0
                    // Room debt is paid first (priority)
                    return Math.min(this.memberRoomDebt, paymentAmount)
                },

                calculateContributionAllocation() {
                    const paymentAmount = parseFloat(this.form.amount_total) || 0
                    const roomAllocation = this.calculateRoomAllocation()
                    const remainingAfterRoom = paymentAmount - roomAllocation

                    // Calculate total needed for selected contributions
                    let contributionTotal = 0
                    for (const contribId of this.form.selectedContributions) {
                        const contrib = this.pendingContributions.find(c => c.id === contribId)
                        if (contrib) {
                            const remaining = contrib.amount_expected - (contrib.amount_paid || 0)
                            contributionTotal += remaining
                        }
                    }

                    return Math.min(contributionTotal, remainingAfterRoom)
                },

                calculateRemaining() {
                    const paymentAmount = parseFloat(this.form.amount_total) || 0
                    const roomAllocation = this.calculateRoomAllocation()
                    const contributionAllocation = this.calculateContributionAllocation()
                    return Math.max(0, paymentAmount - roomAllocation - contributionAllocation)
                },

                resetForm() {
                    this.form = {
                        member_id: '',
                        amount_total: '',
                        currency: 'USD',
                        date: new Date().toISOString().split('T')[0],
                        note: '',
                        is_advance: false,
                        selectedContributions: [],
                        room_allocation: 0
                    }
                    this.pendingContributions = []
                    this.memberRoomDebt = 0
                },

                async savePayment() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const paymentAmount = parseFloat(this.form.amount_total)
                    const amountUsd = Utils.convertToUSD(paymentAmount, this.form.currency)

                    // Calculate allocations
                    const roomAllocation = this.calculateRoomAllocation()
                    const contributionAllocation = this.calculateContributionAllocation()

                    // Check if payment covers at least room debt
                    if (paymentAmount < roomAllocation && this.memberRoomDebt > 0) {
                        if (!confirm(`Ce paiement (${Utils.formatCurrency(paymentAmount, this.form.currency)}) ne couvre pas la dette de salle (${Utils.formatCurrency(roomAllocation, this.form.currency)}). Voulez-vous continuer? Le solde restera dû.`)) {
                            return
                        }
                    }

                    // Get current period from pending contributions
                    const currentPeriod = this.pendingContributions[0]?.period
                    const periodId = currentPeriod?.id

                    if (!periodId && !this.form.is_advance) {
                        Utils.showToast('Erreur: Aucune période active trouvée', 'error')
                        return
                    }

                    // Create payment WITH period_id (NOUVEAU)
                    const { data: payment, error: paymentError } = await supabase
                        .from('payments')
                        .insert({
                            member_id: this.form.member_id,
                            amount_total: paymentAmount,
                            currency: this.form.currency,
                            amount_usd: amountUsd,
                            date: this.form.date,
                            period_id: periodId,  // ← NOUVEAU: Lien avec la période
                            is_advance: this.form.is_advance || false,
                            is_room_payment: roomAllocation > 0,  // ← NOUVEAU: Flag salle
                            note: this.form.note
                        })
                        .select()

                    if (paymentError) {
                        Utils.showToast('Erreur de création: ' + paymentError.message, 'error')
                        return
                    }

                    const paymentId = payment[0].id
                    let remainingAmount = paymentAmount

                    // 1. FIRST: Allocate to room debt (priority) using room_contributions table
                    if (roomAllocation > 0 && periodId) {
                        const { error: roomError } = await supabase.from('room_contributions').insert({
                            member_id: this.form.member_id,
                            period_id: periodId,
                            payment_id: paymentId,
                            amount: roomAllocation,
                            currency: this.form.currency,
                            amount_usd: Utils.convertToUSD(roomAllocation, this.form.currency),
                            date: this.form.date,
                            description: `Contribution dette salle - ${this.form.note || 'Paiement mensuel'}`
                        })

                        if (roomError) {
                            console.error('Erreur room_contributions:', roomError)
                            Utils.showToast('Erreur lors de l\'enregistrement de la contribution salle', 'warning')
                        }
                        remainingAmount -= roomAllocation
                    }

                    // 2. SECOND: Allocate to selected contributions
                    if (this.form.selectedContributions.length > 0 && remainingAmount > 0) {
                        const { data: contributions } = await supabase
                            .from('expected_contributions')
                            .select('*')
                            .in('id', this.form.selectedContributions)

                        const allocationData = []
                        for (const contrib of contributions) {
                            const remaining = contrib.amount_expected - (contrib.amount_paid || 0)
                            const amount = Math.min(remaining, remainingAmount)
                            
                            if (amount > 0) {
                                allocationData.push({
                                    payment_id: paymentId,
                                    expected_contribution_id: contrib.id,
                                    amount: amount
                                })
                                remainingAmount -= amount
                                
                                // Update contribution status
                                const newPaid = (contrib.amount_paid || 0) + amount
                                const status = newPaid >= contrib.amount_expected ? 'PAID' : 'PARTIAL'
                                
                                await supabase
                                    .from('expected_contributions')
                                    .update({ amount_paid: newPaid, status })
                                    .eq('id', contrib.id)
                            }
                        }

                        if (allocationData.length > 0) {
                            await supabase.from('payment_allocations').insert(allocationData)
                        }
                    }

                    // 3. If there's still remaining amount, it stays as credit/advance
                    if (remainingAmount > 0) {
                        Utils.showToast(`Paiement enregistré. ${Utils.formatCurrency(remainingAmount, this.form.currency)} reste en crédit pour paiements futurs.`, 'success')
                    } else {
                        Utils.showToast('Paiement enregistré avec allocation automatique')
                    }

                    this.showModal = false
                    await this.loadPayments()
                    this.resetForm()
                }
            }
        }
    </script>
</body>
</html>

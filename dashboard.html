<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord - Emerge Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/store.js"></script>
    <script src="js/ui.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="grad-mesh">

    <div id="app-layout"></div>

    <!-- Page Content Source -->
    <div id="content-to-move" x-data="dashboardData()" x-init="init()" class="space-y-8">
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="card-premium p-6 flex flex-col justify-between">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-[rgba(245,158,11,0.15)] rounded-2xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-[#F59E0B]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    </div>
                </div>
                <div>
                    <p class="text-xs font-black text-[#71717A] uppercase tracking-widest">Total Membres</p>
                    <p class="text-3xl font-black text-[#FAFAFA] mt-1" x-text="stats.totalMembers">0</p>
                </div>
            </div>

            <div class="card-premium p-6 flex flex-col justify-between">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-[rgba(34,197,94,0.15)] rounded-2xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-[#22C55E]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                </div>
                <div>
                    <p class="text-xs font-black text-[#71717A] uppercase tracking-widest">Contributions / Mois</p>
                    <p class="text-3xl font-black text-[#22C55E] mt-1" x-text="Utils.formatCurrency(stats.monthlyPayments, 'USD')">$0</p>
                </div>
            </div>

            <div class="card-premium p-6 flex flex-col justify-between">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-[rgba(239,68,68,0.15)] rounded-2xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-[#EF4444]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                </div>
                <div>
                    <p class="text-xs font-black text-[#71717A] uppercase tracking-widest">Dépenses / Mois</p>
                    <p class="text-3xl font-black text-[#EF4444] mt-1" x-text="Utils.formatCurrency(stats.monthlyExpenses, 'USD')">$0</p>
                </div>
            </div>

            <div class="card-premium p-6 flex flex-col justify-between">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-[rgba(245,158,11,0.15)] rounded-2xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-[#F59E0B]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                    </div>
                </div>
                <div>
                    <p class="text-xs font-black text-[#71717A] uppercase tracking-widest">Solde Actuel</p>
                    <p class="text-3xl font-black text-[#F59E0B] mt-1" x-text="Utils.formatCurrency(stats.balance, 'USD')">$0</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Quick Actions -->
            <div class="card-premium p-6 h-full flex flex-col">
                <h3 class="text-lg font-bold text-slate-900 mb-6 flex items-center gap-2">
                    <span class="w-1.5 h-6 bg-blue-600 rounded-full"></span>
                    Actions Rapides
                </h3>
                <div class="grid grid-cols-2 gap-3 flex-1">
                    <a href="contributions.html" class="flex flex-col items-center justify-center p-4 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-2xl transition-all group">
                        <svg class="w-8 h-8 mb-2 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        <span class="text-xs font-bold uppercase tracking-tight">Payer</span>
                    </a>
                    <a href="depenses.html" class="flex flex-col items-center justify-center p-4 bg-rose-50 hover:bg-rose-100 text-rose-700 rounded-2xl transition-all group">
                        <svg class="w-8 h-8 mb-2 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        <span class="text-xs font-bold uppercase tracking-tight">Dépense</span>
                    </a>
                    <a href="membres.html" class="flex flex-col items-center justify-center p-4 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-2xl transition-all group">
                        <svg class="w-8 h-8 mb-2 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
                        <span class="text-xs font-bold uppercase tracking-tight">Membre</span>
                    </a>
                    <a href="rapports.html" class="flex flex-col items-center justify-center p-4 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-2xl transition-all group">
                        <svg class="w-8 h-8 mb-2 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <span class="text-xs font-bold uppercase tracking-tight">Rapport</span>
                    </a>
                </div>
            </div>

            <!-- Recent Payments -->
            <div class="lg:col-span-2 card-premium p-4 sm:p-6">
                <div class="flex items-center justify-between mb-4 sm:mb-6">
                    <h3 class="text-base sm:text-lg font-bold text-slate-900 flex items-center gap-2">
                        <span class="w-1.5 h-5 sm:h-6 bg-blue-600 rounded-full"></span>
                        Dernières Contributions
                    </h3>
                    <a href="contributions.html" class="text-xs sm:text-sm font-bold text-blue-600 hover:text-blue-800 transition-colors">Voir tout</a>
                </div>
                <div class="table-container">
                    <table class="w-full">
                        <thead class="hidden sm:table-header-group">
                            <tr>
                                <th class="text-left">Membre</th>
                                <th class="text-left">Montant</th>
                                <th class="text-left">Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="payment in recentPayments" :key="payment.id">
                                <tr class="block sm:table-row border-b sm:border-b-0 last:border-b-0 py-2 sm:py-0">
                                    <!-- Mobile: stacked layout -->
                                    <td class="py-1 sm:py-3 px-2 sm:px-4 block sm:table-cell">
                                        <div class="flex items-center justify-between">
                                            <span class="font-bold text-slate-900 text-sm sm:text-base" x-text="payment.member?.name || 'Inconnu'"></span>
                                            <span class="sm:hidden font-black text-emerald-600 text-sm" x-text="Utils.formatCurrency(payment.amount_usd, 'USD')"></span>
                                        </div>
                                        <div class="sm:hidden text-xs text-slate-500" x-text="Utils.formatDate(payment.date)"></div>
                                    </td>
                                    <!-- Desktop: separate columns -->
                                    <td class="hidden sm:table-cell py-3 px-4 font-black text-emerald-600" x-text="Utils.formatCurrency(payment.amount_usd, 'USD')"></td>
                                    <td class="hidden sm:table-cell py-3 px-4 text-slate-500 font-medium" x-text="Utils.formatDate(payment.date)"></td>
                                </tr>
                            </template>
                            <tr x-show="recentPayments.length === 0">
                                <td colspan="3" class="py-12 text-center text-slate-400 font-medium italic">Aucun paiement récent</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            UIManager.init('Tableau de Bord');
        });

        function dashboardData() {
            return {
                stats: {
                    totalMembers: 0,
                    monthlyPayments: 0,
                    monthlyExpenses: 0,
                    roomDebt: 0,
                    balance: 0
                },
                recentPayments: [],
                loading: false,

                async init() {
                    AuthManager.checkAuth()
                    await this.loadStats()
                    await this.loadRecentPayments()
                },

                async loadStats() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const { count: membersCount } = await supabase
                        .from('members')
                        .select('*', { count: 'exact', head: true })
                        .eq('is_active', true)

                    this.stats.totalMembers = membersCount || 0

                    const startOfMonth = new Date()
                    startOfMonth.setDate(1)
                    startOfMonth.setHours(0, 0, 0, 0)

                    const { data: payments } = await supabase
                        .from('payments')
                        .select('amount_usd')
                        .gte('date', startOfMonth.toISOString())

                    this.stats.monthlyPayments = payments?.reduce((sum, p) => sum + (p.amount_usd || 0), 0) || 0

                    const { data: expenses } = await supabase
                        .from('expenses')
                        .select('amount_usd')
                        .gte('date', startOfMonth.toISOString())

                    this.stats.monthlyExpenses = expenses?.reduce((sum, e) => sum + (e.amount_usd || 0), 0) || 0

                    const { data: allPayments } = await supabase
                        .from('payments')
                        .select('amount_usd')

                    const { data: allExpenses } = await supabase
                        .from('expenses')
                        .select('amount_usd')

                    const totalPayments = allPayments?.reduce((sum, p) => sum + (p.amount_usd || 0), 0) || 0
                    const totalExpenses = allExpenses?.reduce((sum, e) => sum + (e.amount_usd || 0), 0) || 0

                    const currentMonth = new Date().toISOString().slice(0, 7)
                    const { data: currentPeriod } = await supabase
                        .from('periods')
                        .select('id')
                        .eq('month', currentMonth)
                        .single()
                    
                    if (currentPeriod) {
                        const { data: cults } = await supabase
                            .from('cults')
                            .select('cost')
                            .eq('period_id', currentPeriod.id)
                        this.stats.roomDebt = cults?.reduce((sum, c) => sum + (c.cost || 54), 0) || 0
                    }

                    this.stats.balance = totalPayments - totalExpenses - this.stats.roomDebt
                },

                async loadRecentPayments() {
                    const supabase = getSupabase()
                    if (!supabase) return

                    const { data } = await supabase
                        .from('payments')
                        .select('*, member:members(name)')
                        .order('date', { ascending: false })
                        .limit(5)

                    this.recentPayments = data || []
                }
            }
        }
    </script>
</body>
</html>
